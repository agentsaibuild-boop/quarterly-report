<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarterly Report — AIBUILD AGENTS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #263348;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --green: #34d399;
    --red: #f87171;
    --orange: #fb923c;
    --purple: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  header { border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 1.1em; font-weight: 700; letter-spacing: -0.02em; }
  header h1 span { color: var(--accent); }
  .period { font-size: 0.8em; color: var(--muted); background: var(--surface2); padding: 4px 12px; border-radius: 20px; }

  .grid { display: grid; gap: 20px; padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
  .card h2 { font-size: 0.75em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px; }

  .kpi-value { font-size: 2em; font-weight: 800; letter-spacing: -0.03em; }
  .kpi-sub { font-size: 0.8em; color: var(--muted); margin-top: 4px; }
  .kpi-value.red { color: var(--red); }
  .kpi-value.green { color: var(--green); }
  .kpi-value.accent { color: var(--accent); }

  .chart-wrap { position: relative; height: 240px; }
  .chart-wrap.tall { height: 300px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
  th { text-align: left; padding: 8px 12px; color: var(--muted); font-weight: 600; font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid #1e293b; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.72em; font-weight: 700; }
  .badge.active { background: #064e3b; color: var(--green); }
  .badge.low { background: #431407; color: var(--orange); }
  .badge.idle { background: #1e1b4b; color: var(--muted); }
  .badge.folder { background: #1e3a5f; color: var(--accent); }

  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-label { width: 160px; font-size: 0.82em; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
  .bar-num { font-size: 0.78em; color: var(--text); width: 50px; text-align: right; flex-shrink: 0; }

  footer { text-align: center; padding: 32px; color: var(--muted); font-size: 0.75em; border-top: 1px solid var(--border); margin-top: 12px; }

  @media (max-width: 900px) {
    .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr 1fr; }
    header { flex-direction: column; gap: 10px; text-align: center; }
  }
  @media (max-width: 560px) {
    .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
    .grid { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>AIBUILD AGENTS — <span>Quarterly Report</span></h1>
  <div class="period" id="period-label">Loading...</div>
</header>

<div class="grid grid-4" id="kpis"></div>

<div class="grid grid-2">
  <div class="card">
    <h2>Разходи по месеци (€)</h2>
    <div class="chart-wrap"><canvas id="expensesChart"></canvas></div>
  </div>
  <div class="card">
    <h2>AI инструменти — месечен план (€)</h2>
    <div class="chart-wrap"><canvas id="aiChart"></canvas></div>
  </div>
</div>

<div class="grid grid-2">
  <div class="card">
    <h2>Активност по проекти — commits</h2>
    <div id="commitBars" style="margin-top:8px"></div>
  </div>
  <div class="card">
    <h2>Проекти — преглед</h2>
    <table id="projectsTable">
      <thead><tr><th>Проект</th><th>Commits</th><th>+Редове</th><th>Статус</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="grid grid-3">
  <div class="card" style="grid-column: span 2">
    <h2>Разходи по категории (€)</h2>
    <div class="chart-wrap tall"><canvas id="catChart"></canvas></div>
  </div>
  <div class="card">
    <h2>Разбивка разходи</h2>
    <table id="expTable">
      <thead><tr><th>Категория</th><th style="text-align:right">Общо</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<footer id="footer">Генериран: —</footer>

<script>
const COLORS = ['#38bdf8','#34d399','#fb923c','#a78bfa','#f472b6','#facc15','#4ade80','#f87171','#818cf8','#2dd4bf'];

async function load() {
  const res = await fetch('data.json');
  const d = await res.json();

  // Header period
  document.getElementById('period-label').textContent = `${d.period.from} → ${d.period.to}`;
  document.getElementById('footer').textContent = `Генериран: ${new Date(d.generated_at).toLocaleString('bg-BG')}`;

  const fin = d.finances;
  const months = fin.months;
  const totals = fin.totals_per_month;
  const totalAll = Object.values(totals).reduce((a,b) => a+b, 0);

  // KPIs
  const gitProjects = d.projects.filter(p => p.type === 'git');
  const totalCommits = gitProjects.reduce((a,p) => a + (p.stats.commits || 0), 0);
  const activeProjects = gitProjects.filter(p => (p.stats.commits || 0) > 5).length;

  document.getElementById('kpis').innerHTML = `
    <div class="card">
      <h2>Общи разходи</h2>
      <div class="kpi-value accent">€${totalAll.toLocaleString('bg-BG', {maximumFractionDigits:0})}</div>
      <div class="kpi-sub">${months.length} месеца</div>
    </div>
    <div class="card">
      <h2>Приходи</h2>
      <div class="kpi-value red">€0</div>
      <div class="kpi-sub">Q1 2026</div>
    </div>
    <div class="card">
      <h2>Commits (период)</h2>
      <div class="kpi-value green">${totalCommits}</div>
      <div class="kpi-sub">${gitProjects.length} git проекта</div>
    </div>
    <div class="card">
      <h2>Активни проекти</h2>
      <div class="kpi-value accent">${activeProjects}</div>
      <div class="kpi-sub">>5 commits за периода</div>
    </div>`;

  // Expenses by month chart
  new Chart(document.getElementById('expensesChart'), {
    type: 'bar',
    data: {
      labels: months,
      datasets: [{
        label: 'Разходи (€)',
        data: months.map(m => totals[m] || 0),
        backgroundColor: '#38bdf8aa',
        borderColor: '#38bdf8',
        borderWidth: 2,
        borderRadius: 6,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', callback: v => '€'+v.toLocaleString() } }
      }
    }
  });

  // AI tools chart — only real tools with price > 0 and not summary rows
  const skipTools = ['Общо планове','Общо API','Общо','Бюджетен ред'];
  const aiTools = fin.ai_tools.filter(t => t.price_per_month > 0 && !skipTools.includes(t.tool));
  new Chart(document.getElementById('aiChart'), {
    type: 'doughnut',
    data: {
      labels: aiTools.map(t => t.tool),
      datasets: [{ data: aiTools.map(t => t.price_per_month), backgroundColor: COLORS, borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12 } },
        tooltip: { callbacks: { label: ctx => ` €${ctx.parsed}/мес` } }
      }
    }
  });

  // Commit bars
  const sorted = [...gitProjects].sort((a,b) => (b.stats.commits||0) - (a.stats.commits||0));
  const maxC = sorted[0]?.stats.commits || 1;
  const barColors = ['#34d399','#34d399','#38bdf8','#38bdf8','#fb923c','#fb923c','#94a3b8'];
  document.getElementById('commitBars').innerHTML = sorted.map((p,i) => {
    const c = p.stats.commits || 0;
    const pct = Math.round(c / maxC * 100);
    return `<div class="bar-row">
      <div class="bar-label">${p.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColors[Math.min(i,barColors.length-1)]}"></div></div>
      <div class="bar-num">${c}</div>
    </div>`;
  }).join('');

  // Projects table
  const tbody = document.querySelector('#projectsTable tbody');
  tbody.innerHTML = d.projects.map(p => {
    const s = p.stats;
    const commits = s.commits ?? '—';
    const lines = s.lines_added != null ? `+${s.lines_added.toLocaleString()}` : `${s.files ?? '?'} файла`;
    let badge;
    if (p.type === 'folder') badge = '<span class="badge folder">папка</span>';
    else if ((s.commits||0) > 20) badge = '<span class="badge active">активен</span>';
    else if ((s.commits||0) > 0) badge = '<span class="badge low">нисък</span>';
    else badge = '<span class="badge idle">неактивен</span>';
    return `<tr><td>${p.name}</td><td>${commits}</td><td style="color:#34d399">${lines}</td><td>${badge}</td></tr>`;
  }).join('');

  // Expenses by category chart
  const expCats = fin.expenses;
  const catLabels = Object.keys(expCats);
  const catTotals = catLabels.map(k => Object.values(expCats[k]).reduce((a,b)=>a+b,0));
  const combined = catLabels.map((l,i) => ({l, v: catTotals[i]})).sort((a,b) => b.v-a.v);

  new Chart(document.getElementById('catChart'), {
    type: 'bar',
    data: {
      labels: combined.map(x => x.l),
      datasets: [{
        data: combined.map(x => x.v),
        backgroundColor: combined.map((_,i) => COLORS[i % COLORS.length] + 'cc'),
        borderColor: combined.map((_,i) => COLORS[i % COLORS.length]),
        borderWidth: 1, borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', callback: v => '€'+v.toLocaleString() } },
        y: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 11 } } }
      }
    }
  });

  // Expenses table
  document.querySelector('#expTable tbody').innerHTML = combined.map(x =>
    `<tr><td>${x.l}</td><td style="text-align:right;font-weight:600">€${x.v.toLocaleString('bg-BG',{maximumFractionDigits:0})}</td></tr>`
  ).join('');
}

load().catch(e => {
  document.body.innerHTML += `<div style="padding:40px;color:#f87171">Грешка при зареждане на data.json: ${e.message}</div>`;
});
</script>
</body>
</html>
