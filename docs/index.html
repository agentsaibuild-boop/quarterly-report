<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тримесечен отчет — AIBUILD AGENTS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #263348;
    --border: #334155; --text: #f1f5f9; --muted: #94a3b8;
    --accent: #38bdf8; --green: #34d399; --red: #f87171;
    --orange: #fb923c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  header { border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  header h1 { font-size: 1.1em; font-weight: 700; }
  header h1 span { color: var(--accent); }
  .period { font-size: 0.8em; color: var(--muted); background: var(--surface2); padding: 4px 12px; border-radius: 20px; }

  .wrap { max-width: 1400px; margin: 0 auto; padding: 28px 32px 60px; display: flex; flex-direction: column; gap: 20px; }
  .row { display: grid; gap: 20px; }
  .col-4 { grid-template-columns: repeat(2, 1fr); }
  .col-2   { grid-template-columns: repeat(2, 1fr); }
  .col-2-1 { grid-template-columns: 2fr 1fr; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
  .card h2 { font-size: 0.72em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 14px; }

  .kpi-value { font-size: 2em; font-weight: 800; letter-spacing: -0.03em; }
  .kpi-sub   { font-size: 0.78em; color: var(--muted); margin-top: 4px; }
  .red    { color: var(--red); }
  .green  { color: var(--green); }
  .accent { color: var(--accent); }

  .chart-wrap      { position: relative; height: 240px; }
  .chart-wrap.tall { height: 320px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.84em; }
  th { text-align: left; padding: 7px 10px; color: var(--muted); font-size: 0.72em; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
  td { padding: 9px 10px; border-bottom: 1px solid #1e293b; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* Projects */
  .projects-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .proj-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .proj-name  { font-weight: 700; font-size: 0.95em; }
  .proj-desc  { font-size: 0.8em; color: var(--muted); line-height: 1.55; }
  .proj-stats { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .proj-stat  { font-size: 0.75em; background: var(--surface); padding: 3px 8px; border-radius: 6px; }
  .proj-stat span { color: var(--green); font-weight: 700; }


  footer { text-align: center; padding: 24px; color: var(--muted); font-size: 0.75em; border-top: 1px solid var(--border); }

  @media(max-width:1000px) {
    .col-4 { grid-template-columns: 1fr 1fr; }
    .col-2-1 { grid-template-columns: 1fr; }
    .projects-grid { grid-template-columns: 1fr 1fr; }
  }
  @media(max-width:600px) {
    .col-4,.col-2,.col-2-1 { grid-template-columns: 1fr; }
    .projects-grid { grid-template-columns: 1fr; }
    .wrap { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>AIBUILD AGENTS — <span>Тримесечен отчет</span></h1>
  <div class="period" id="period-label">Зареждане...</div>
</header>

<div class="wrap">

  <!-- KPIs -->
  <div class="row col-4" id="kpis"></div>


  <!-- Разходи по месеци + Разбивка -->
  <div class="row col-2-1">
    <div class="card">
      <h2>Разходи по месеци (€)</h2>
      <div class="chart-wrap"><canvas id="expensesChart"></canvas></div>
    </div>
    <div class="card">
      <h2>Разбивка разходи</h2>
      <table id="expTable">
        <thead><tr><th>Категория</th><th style="text-align:right">Общо</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Разходи по категории -->
  <div class="card">
    <h2>Разходи по категории (€)</h2>
    <div class="chart-wrap tall"><canvas id="catChart"></canvas></div>
  </div>

  <!-- Степен на завършеност -->
  <div class="card">
    <h2>Степен на зрялост по проект (%)</h2>
    <div class="chart-wrap tall"><canvas id="maturityChart"></canvas></div>
  </div>

  <!-- Проекти -->
  <div class="card">
    <h2>Проекти</h2>
    <div class="projects-grid" id="projectsGrid"></div>
  </div>

</div>

<footer id="footer">Генериран: —</footer>


<script>
window.CHAT_KEY = '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';
const COLORS = ['#38bdf8','#34d399','#fb923c','#a78bfa','#f472b6','#facc15','#4ade80','#f87171','#818cf8','#2dd4bf','#e879f9','#a3e635'];

const PROJECT_DESCRIPTIONS = {
  'website':          'SaaS платформа AIBUILD AGENTS за строителния сектор. Включва публичен маркетинг сайт и вътрешна уеб апликация с автентикация (2FA), Stripe плащания и каталог от AI приложения. Дава на строителни компании и инженери достъп до AI агенти за обработка на техническа документация и изготвяне на оферти.',
  'calculator':       'FTE Hypothesis Validator — бизнес инструмент, който математически валидира дали внедряването на AI може реално да намали брой служители. Пресмята в три сценария (оптимистичен, реалистичен, песимистичен) дали спестените часове са достатъчни за реална редукция на екипа. Инструмент за продажбени разговори и консултации с клиенти.',
  'schedule-generator':'AI-базиран генератор на строителни графици с Gantt визуализация и MS Project XML export. Потребителят отговаря на въпросник за операции, ресурси и паралелни екипи — системата генерира автоматично оптимизиран график. Най-зрелият продукт в портфолиото, близо до production-ready.',
  'tp-agent':         'Агент за автоматично изготвяне на технически предложения за обществени поръчки. Анализира документация, структурира информация и генерира готово техническо предложение. Версия 1.3 с пълен backend и frontend — стартиран, предстои активна разработка.',
  'xml-json':         'Конвертор XML→JSON, стъпка 1 от pipeline-а на строителния агент. Обработва строителна документация и я превежда в структуриран JSON формат за последваща обработка от AI. Завършен помощен инструмент с уеб интерфейс.',
  'NemoClaw':         'OpenClaw — open-source sandbox среда за безопасно стартиране на автономни AI агенти с inference през NVIDIA cloud. Осигурява изолирана, контролирана среда за изпълнение на агенти без риск за основната система. Ключова инфраструктурна компонента за целия AI стек.',
  'aiAgents':         'Централна 24/7 AI агент система — оркестрира Claude Code agent, паралелни task опашки и Telegram нотификации. Служи като инфраструктурна основа, върху която работят останалите агенти. Поддържа множество AI модели едновременно (Claude, Groq, OpenRouter).',
  'ai-agent':         'Централна 24/7 AI агент система — оркестрира Claude Code agent, паралелни task опашки и Telegram нотификации. Служи като инфраструктурна основа, върху която работят останалите агенти. Поддържа множество AI модели едновременно (Claude, Groq, OpenRouter).',
  'office-assistant':   'AI офис асистент с FastAPI backend и асинхронна task queue. Приема задача с прикачен документ, AI модел (Groq/Qwen) я обработва и връща резултат. Активно използван — обработва реални заявки за анализ на бюджети и документи.',
  'ai-projects/idea-gate': 'Платформа за управление и валидиране на бизнес идеи с AI. Структурира, оценява и приоритизира идеи по зададени критерии — пазарен потенциал, сложност на изпълнение, ресурси. Помага на екипа да взема по-обосновани решения кои инициативи да развива.',
  'quarterly-report':      'Инструментът, с който четете този отчет. Автоматично събира данни от всички GitHub репота и финансовия Excel, генерира визуален dashboard и го публикува онлайн. Пуска се с една команда веднъж на тримесечие.',
  'procurement-pipeline':  'Pipeline за автоматизация на процеса по обществени поръчки — от сваляне и анализ на документация до структуриране на офертата. В момента е в най-ранна фаза — концепцията е оформена, техническата реализация предстои.',
};

const PROJECT_MATURITY = {
  'schedule-generator':    85,
  'xml-json':              90,
  'NemoClaw':              40,
  'website':               35,
  'aiAgents':              30,
  'ai-agent':              30,
  'ai-projects/idea-gate': 30,
  'office-assistant':      20,
  'calculator':            25,
  'tp-agent':              15,
  'procurement-pipeline':   5,
  'quarterly-report':      70,
};

let reportData = null;

async function load() {
  const res = await fetch('data.json');
  reportData = await res.json();
  const d = reportData;
  const fin = d.finances;
  const months = fin.months;
  const totals = fin.totals_per_month;
  const totalAll = Object.values(totals).reduce((a,b)=>a+b,0);
  const gitProjects = d.projects.filter(p=>p.type==='git');
  const totalCommits = gitProjects.reduce((a,p)=>a+(p.stats.commits||0),0);
  const activeCount = gitProjects.filter(p=>(p.stats.commits||0)>5).length;

  document.getElementById('period-label').textContent = `${d.period.from} → ${d.period.to}`;
  document.getElementById('footer').textContent = `Генериран: ${new Date(d.generated_at).toLocaleString('bg-BG')}`;

  // KPIs
  document.getElementById('kpis').innerHTML = `
    <div class="card"><h2>Общи разходи</h2><div class="kpi-value accent">€${totalAll.toLocaleString('bg-BG',{maximumFractionDigits:0})}</div><div class="kpi-sub">${months.length} месеца</div></div>
    <div class="card"><h2>Приходи</h2><div class="kpi-value red">€0</div><div class="kpi-sub">Q1 2026</div></div>`;

  // Expenses by month
  new Chart(document.getElementById('expensesChart'), {
    type: 'bar',
    data: {
      labels: months,
      datasets: [{ label: 'Разходи (€)', data: months.map(m=>totals[m]||0),
        backgroundColor: '#38bdf855', borderColor: '#38bdf8', borderWidth: 2, borderRadius: 6 }]
    },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{grid:{color:'#334155'},ticks:{color:'#94a3b8'}},
        y:{grid:{color:'#334155'},ticks:{color:'#94a3b8',callback:v=>'€'+v.toLocaleString()}}
      }
    }
  });

  // Breakdown table
  const catList = Object.entries(fin.expenses)
    .map(([k,v])=>({k,total:Object.values(v).reduce((a,b)=>a+b,0)}))
    .sort((a,b)=>b.total-a.total);
  document.querySelector('#expTable tbody').innerHTML = catList.map(x=>
    `<tr><td>${x.k}</td><td style="text-align:right;font-weight:600;color:var(--accent)">€${x.total.toLocaleString('bg-BG',{maximumFractionDigits:0})}</td></tr>`
  ).join('');

  // Category bar chart
  new Chart(document.getElementById('catChart'), {
    type: 'bar',
    data: {
      labels: catList.map(x=>x.k),
      datasets: [{ data: catList.map(x=>x.total),
        backgroundColor: catList.map((_,i)=>COLORS[i%COLORS.length]+'bb'),
        borderColor: catList.map((_,i)=>COLORS[i%COLORS.length]),
        borderWidth:1, borderRadius:4 }]
    },
    options: { indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:'#334155'},ticks:{color:'#94a3b8',callback:v=>'€'+v.toLocaleString()}},
        y:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:11}}}
      }
    }
  });

  // Maturity chart
  const maturityProjects = d.projects
    .filter(p => p.name !== 'quarterly-report')
    .map(p => ({ name: p.name, pct: PROJECT_MATURITY[p.name] ?? 10 }))
    .sort((a,b) => b.pct - a.pct);

  new Chart(document.getElementById('maturityChart'), {
    type: 'bar',
    data: {
      labels: maturityProjects.map(p => p.name),
      datasets: [{
        data: maturityProjects.map(p => p.pct),
        backgroundColor: maturityProjects.map(p => {
          if (p.pct >= 75) return '#34d39988';
          if (p.pct >= 40) return '#38bdf888';
          if (p.pct >= 20) return '#fb923c88';
          return '#f8717188';
        }),
        borderColor: maturityProjects.map(p => {
          if (p.pct >= 75) return '#34d399';
          if (p.pct >= 40) return '#38bdf8';
          if (p.pct >= 20) return '#fb923c';
          return '#f87171';
        }),
        borderWidth: 1, borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.x}% завършен` } }
      },
      scales: {
        x: { min:0, max:100, grid:{color:'#334155'}, ticks:{color:'#94a3b8', callback:v=>v+'%'} },
        y: { grid:{display:false}, ticks:{color:'#94a3b8', font:{size:11}} }
      }
    }
  });

  // Projects grid — сортиране по commits+редове, quarterly-report накрая
  const sorted = [...d.projects].sort((a, b) => {
    if (a.name === 'quarterly-report') return 1;
    if (b.name === 'quarterly-report') return -1;
    const scoreA = (a.stats.commits||0) * 10 + (a.stats.lines_added||a.stats.files||0) / 1000;
    const scoreB = (b.stats.commits||0) * 10 + (b.stats.lines_added||b.stats.files||0) / 1000;
    return scoreB - scoreA;
  });

  document.getElementById('projectsGrid').innerHTML = sorted.map(p => {
    const s = p.stats;
    const desc = PROJECT_DESCRIPTIONS[p.name] || p.description || '—';
    let statsHtml;
    if (p.type === 'folder') {
      statsHtml = `<div class="proj-stat">${s.files??'?'} файла</div><div class="proj-stat">последна промяна: <span>${s.last_modified||'?'}</span></div>`;
    } else {
      statsHtml = `<div class="proj-stat">commits: <span>${s.commits||0}</span></div><div class="proj-stat">+<span>${(s.lines_added||0).toLocaleString()}</span> реда</div>`;
    }
    return `<div class="proj-card">
      <div class="proj-name">${p.name}</div>
      <div class="proj-desc">${desc}</div>
      <div class="proj-stats">${statsHtml}</div>
    </div>`;
  }).join('');

  // Load saved key
}


load().catch(console.error);
</script>
</body>
</html>
